name: archive_1_-02
display_name: tomatoPlants
description: Scenario profile for tomatoPlants.
backbone_type: yolo_detection
dataset: archive (1)-02
base_model: Insight/insight_local/Insight_assets/models/yolov8n.pt
classes:
- Bacterial Spot
- Early_Blight
- Healthy
- Late_blight
- Leaf Mold
- Target_Spot
- black spot
postproc: mlops.pipeline.postproc.generic_detection:run
weights: mlops/models/archive_1_-02/v1/weights.pt
hyperparams:
  epochs: 20
  imgsz: 640
  quality_stop_enabled: false
  quality_stop_metric: map50_95
  quality_stop_threshold: 0.8
  quality_stop_min_epochs: 5
  quality_stop_consecutive_epochs: 2
  quality_stop_rapid_clear_enabled: true
  quality_stop_rapid_clear_loss_ratio: 0.35
  quality_stop_rapid_clear_metric_margin: 0.03
  quality_regression_enabled: true
  quality_regression_abs_tolerance: 0.05
  quality_regression_rel_tolerance: 0.15
  quality_regression_consecutive_epochs: 1
  quality_stop_attempt_mode: true
  quality_stop_max_time_seconds: 0
  guard_profile: balanced
